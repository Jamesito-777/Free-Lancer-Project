<!-- views/components/card.html -->

<div class="card">
    <h3 class="card__title">{{title}}</h3>
    <div class="card__icons">
        <img src="{{icon1}}" alt="Ícono Principal" class="card__icon
        card__icon--main">
        <img src="{{icon2}}" alt="Ícono Secundario" class="card__icon
        card__icon--secundary">
    </div>
    <p class="card__description">{{description}}</p>
</div>
