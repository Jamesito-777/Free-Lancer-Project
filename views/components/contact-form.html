<section class="contact-form">
    <h2 class="contact-form__title">
        Diligencia los campos y contáctanos
    </h2>
    <form class="contact-form__form">
        <div class="contact-form__row">
            <label for="" class="contact-form__label">
                Nombre:
            <input type="text" class="contact-form__input" placeholder="Ingrese su nombre" required>
            </label>

            <label for="" class="contact-form__label">
                Telefono:
            <input type="text" class="contact-form__input" placeholder="Ingrese su número de teléfono" required>
            </label>

        </div>

        <label for="" class="contact-form__label">
            Correo:
        <input type="text" class="contact-form__input" placeholder="Ingrese su correo electrónico" required>
        </label>

        <label for="" class="contact-form__label">
            Mensage:
            <textarea name="" id="" class="contact-form__text-area" placeholder="Ingresa tu mensaje aqui.." required></textarea>
        </label>
        
        <!-- Botones -->
        
        <div class="contact-form__actions"> 
        <button type="submit" class="contact-form__button">Cancelar</button>

        <button type="button" class="contact-form__button contact-form__button--green">Enviar</button>
        </div>
    </form>
</section>
